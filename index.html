<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球全时区转换器</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'PingFang SC', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; max-width: 550px; }
        h2 { text-align: center; margin-bottom: 2rem; font-size: 1.6rem; color: var(--primary); }
        
        .field { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #64748b; font-size: 0.85rem; }
        
        select, input[type="datetime-local"] {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px;
            font-size: 15px; box-sizing: border-box; outline: none; transition: all 0.2s;
        }
        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

        button {
            width: 100%; padding: 15px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: all 0.3s; margin-top: 10px;
        }
        button:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2); }

        .results { margin-top: 25px; border-top: 2px solid #f1f5f9; }
        .result-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 0; border-bottom: 1px solid #f1f5f9;
        }
        .city-box { display: flex; flex-direction: column; }
        .city-label { font-weight: 600; color: #334155; }
        .city-zone { font-size: 0.75rem; color: #94a3b8; }
        .time-display { text-align: right; }
        .time-val { color: var(--primary); font-weight: 700; font-size: 1.1rem; display: block; }
        .date-val { font-size: 0.8rem; color: #64748b; }
    </style>
</head>
<body>

<div class="card">
    <h2>🌍 全球时间转换器</h2>
    
    <div class="field">
        <label>1. 设置输入时间的来源时区：</label>
        <select id="baseZone">
            <option value="Asia/Shanghai">北京时间 (中国)</option>
            <option value="America/Chicago">美国中部时间 (CST)</option>
            <option value="America/Los_Angeles">美国西部时间 (PST/PDT)</option>
            <option value="Pacific/Honolulu">夏威夷时间 (HST)</option>
            <option value="Europe/Paris">巴黎时间 (欧洲中部)</option>
            <option value="Asia/Seoul">首尔时间 (韩国)</option>
            <option value="America/New_York">美国东部时间 (EST)</option>
            <option value="Europe/London">伦敦时间 (英国)</option>
        </select>
    </div>

    <div class="field">
        <label>2. 输入该地当前的日期和时间：</label>
        <input type="datetime-local" id="timeInput">
    </div>

    <button onclick="convert()">同步全球时间</button>

    <div class="results" id="output">
        </div>
</div>

<script>
    // 初始化填入本地时间
    window.onload = () => {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('timeInput').value = now.toISOString().slice(0, 16);
    };

    function convert() {
        const inputStr = document.getElementById('timeInput').value;
        const baseZone = document.getElementById('baseZone').value;
        
        if (!inputStr) return;

        // 关键：将用户输入的时间解析为该时区的绝对时间点
        const formatterForParse = new Intl.DateTimeFormat('en-US', {
            timeZone: baseZone,
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false
        });
        
        // 这里的逻辑是利用特定的时区偏移创建 Date 对象
        const dateObj = new Date(inputStr);
        const diff = new Date(dateObj.toLocaleString('en-US', {timeZone: baseZone})) - dateObj;
        const finalDate = new Date(dateObj.getTime() - diff);

        const targetZones = [
            { label: "北京", zone: "Asia/Shanghai", desc: "中国" },
            { label: "首尔", zone: "Asia/Seoul", desc: "韩国" },
            { label: "芝加哥", zone: "America/Chicago", desc: "美中" },
            { label: "洛杉矶", zone: "America/Los_Angeles", desc: "美西" },
            { label: "檀香山", zone: "Pacific/Honolulu", desc: "夏威夷" },
            { label: "巴黎", zone: "Europe/Paris", desc: "法国" },
            { label: "纽约", zone: "America/New_York", desc: "美东" },
            { label: "伦敦", zone: "Europe/London", desc: "英国" }
        ];

        let html = "";
        targetZones.forEach(item => {
            const timePart = new Intl.DateTimeFormat('zh-CN', {
                timeZone: item.zone,
                hour: 'numeric', minute: '2-digit',
                hour12: true
            }).format(finalDate);

            const datePart = new Intl.DateTimeFormat('zh-CN', {
                timeZone: item.zone,
                month: 'short', day: 'numeric', weekday: 'short'
            }).format(finalDate);

            html += `
                <div class="result-item">
                    <div class="city-box">
                        <span class="city-label">${item.label}</span>
                        <span class="city-zone">${item.desc}</span>
                    </div>
                    <div class="time-display">
                        <span class="time-val">${timePart}</span>
                        <span class="date-val">${datePart}</span>
                    </div>
                </div>
            `;
        });

        document.getElementById('output').innerHTML = html;
    }
</script>

</body>
</html>
